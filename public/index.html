<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DragScroll - 拖拽滚动组件演示</title>
    <style>
      :root {
        --primary: #4a90e2;
        --primary-hover: #357abd;
        --bg: #f5f7fa;
        --card-bg: #ffffff;
        --text: #2c3e50;
        --text-secondary: #6b7c93;
        --border: #e3e8ef;
        --radius: 10px;
        --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
        --shadow-hover: 0 6px 20px rgba(0, 0, 0, 0.1);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.6;
      }

      /* ---- Header ---- */
      .header {
        text-align: center;
        padding: 40px 20px 24px;
      }

      .header h1 {
        font-size: 30px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .header p {
        color: var(--text-secondary);
        font-size: 15px;
        max-width: 540px;
        margin: 0 auto;
      }

      /* ---- Layout ---- */
      .playground {
        max-width: 960px;
        margin: 0 auto;
        padding: 0 20px 60px;
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
        align-items: start;
      }

      @media (max-width: 768px) {
        .playground {
          grid-template-columns: 1fr;
        }
      }

      /* ---- Scroll Area ---- */
      .scroll-area {
        background: var(--card-bg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      #scrollContainer {
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      .item {
        padding: 16px 20px;
        background: var(--card-bg);
        border-radius: 8px;
        border-left: 4px solid var(--primary);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        user-select: none;
        transition: box-shadow 0.2s;
      }

      .item:hover {
        box-shadow: var(--shadow-hover);
      }

      .item h3 {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 4px;
        color: var(--text);
      }

      .item p {
        font-size: 13px;
        color: var(--text-secondary);
        line-height: 1.5;
      }

      /* ---- Stats Bar ---- */
      .stats {
        display: flex;
        gap: 16px;
        justify-content: center;
        padding: 10px 0 0;
        font-size: 13px;
        color: var(--text-secondary);
        font-variant-numeric: tabular-nums;
      }

      .stats span {
        background: var(--bg);
        padding: 4px 12px;
        border-radius: 6px;
      }

      /* ---- Sidebar ---- */
      .sidebar {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .panel {
        background: var(--card-bg);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px;
      }

      .panel-title {
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--text-secondary);
        margin-bottom: 12px;
      }

      /* ---- Buttons ---- */
      .btn-group {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .btn {
        padding: 7px 14px;
        font-size: 13px;
        font-weight: 500;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.15s;
        color: white;
        background: var(--primary);
      }

      .btn:hover {
        background: var(--primary-hover);
        transform: translateY(-1px);
      }

      .btn:active {
        transform: translateY(0);
      }

      .btn--outline {
        background: transparent;
        color: var(--primary);
        border: 1px solid var(--primary);
      }

      .btn--outline:hover {
        background: rgba(74, 144, 226, 0.08);
      }

      .btn--danger {
        background: #e74c3c;
      }

      .btn--danger:hover {
        background: #c0392b;
      }

      /* ---- Form Controls ---- */
      .form-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 10px;
      }

      .form-row:last-child {
        margin-bottom: 0;
      }

      .form-row label {
        font-size: 13px;
        color: var(--text-secondary);
        white-space: nowrap;
        min-width: 40px;
      }

      .form-input {
        flex: 1;
        padding: 6px 10px;
        font-size: 13px;
        border: 1px solid var(--border);
        border-radius: 6px;
        outline: none;
        transition: border-color 0.2s;
        color: var(--text);
        background: var(--bg);
      }

      .form-input:focus {
        border-color: var(--primary);
      }

      textarea.form-input {
        min-height: 80px;
        resize: vertical;
        font-family: 'SF Mono', 'Fira Code', monospace;
      }

      /* ---- Toggle ---- */
      .toggle-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .toggle-label {
        font-size: 13px;
        color: var(--text);
        font-weight: 500;
      }

      .toggle {
        position: relative;
        width: 40px;
        height: 22px;
      }

      .toggle input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .toggle-slider {
        position: absolute;
        inset: 0;
        background: var(--border);
        border-radius: 22px;
        cursor: pointer;
        transition: background 0.2s;
      }

      .toggle-slider::before {
        content: '';
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: transform 0.2s;
      }

      .toggle input:checked + .toggle-slider {
        background: var(--primary);
      }

      .toggle input:checked + .toggle-slider::before {
        transform: translateX(18px);
      }

      /* ---- Event Log ---- */
      .event-log {
        max-height: 140px;
        overflow-y: auto;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 12px;
        line-height: 1.7;
        background: var(--bg);
        border-radius: 6px;
        padding: 8px 10px;
        color: var(--text-secondary);
      }

      .event-log:empty::before {
        content: '暂无事件…';
        color: var(--border);
      }

      .event-log .log-item {
        border-bottom: 1px dashed var(--border);
        padding: 2px 0;
      }

      .event-log .log-item:last-child {
        border-bottom: none;
      }

      .log-tag {
        display: inline-block;
        padding: 0 5px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 600;
        margin-right: 4px;
      }

      .log-tag--start {
        background: #e8f5e9;
        color: #2e7d32;
      }

      .log-tag--move {
        background: #e3f2fd;
        color: #1565c0;
      }

      .log-tag--end {
        background: #fff3e0;
        color: #e65100;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .panel-header .panel-title {
        margin-bottom: 0;
      }

      .btn--sm {
        padding: 3px 8px;
        font-size: 11px;
      }
    </style>
    <link rel="stylesheet" href="./style/css.css" />
  </head>
  <body>
    <!-- Header -->
    <div class="header">
      <h1>DragScroll</h1>
      <p>基于 CSS transform + translate3d 的拖拽滚动组件，支持 GPU 加速、惯性滚动与弹性边界</p>
    </div>

    <!-- Playground -->
    <div class="playground">
      <!-- Left: Scroll Area -->
      <div class="scroll-area">
        <div id="scrollContainer"></div>
        <div class="stats">
          <span id="positionInfo">X: 0 &nbsp; Y: 0</span>
          <span id="velocityInfo">速度: 0 px/帧</span>
        </div>
      </div>

      <!-- Right: Sidebar Controls -->
      <div class="sidebar">
        <!-- Scroll Controls -->
        <div class="panel">
          <div class="panel-title">滚动控制</div>
          <div class="btn-group">
            <button class="btn btn--outline" id="resetBtn">重置</button>
            <button class="btn btn--outline" id="toTopBtn">滚动到顶部</button>
            <button class="btn btn--outline" id="toBottomBtn">滚动到底部</button>
          </div>
        </div>

        <!-- Resize -->
        <div class="panel">
          <div class="panel-title">容器尺寸</div>
          <div class="form-row">
            <label>宽度</label>
            <input class="form-input" type="text" id="width" value="100%" />
          </div>
          <div class="form-row">
            <label>高度</label>
            <input class="form-input" type="text" id="height" value="400px" />
          </div>
          <div class="form-row" style="justify-content: flex-end">
            <button class="btn" id="resizeBtn">应用</button>
          </div>
        </div>

        <!-- Options -->
        <div class="panel">
          <div class="panel-title">选项</div>
          <div class="toggle-row">
            <span class="toggle-label">只读模式 (readonly)</span>
            <label class="toggle">
              <input type="checkbox" id="readonly" />
              <span class="toggle-slider"></span>
            </label>
          </div>
          <div class="toggle-row" style="margin-top: 10px">
            <span class="toggle-label">隐藏滚动条 (hideScrollbar)(销毁重建)</span>
            <label class="toggle">
              <input type="checkbox" id="hideScrollbar" />
              <span class="toggle-slider"></span>
            </label>
          </div>
        </div>

        <!-- Event Log -->
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">事件回调</div>
            <button class="btn btn--outline btn--sm" id="clearLog">清空</button>
          </div>
          <div class="event-log" id="eventLog"></div>
        </div>

        <!-- Custom Content -->
        <div class="panel">
          <div class="panel-title">自定义内容</div>
          <textarea class="form-input" id="content" placeholder="输入 HTML 内容…"></textarea>
          <div class="form-row" style="justify-content: flex-end; margin-top: 8px">
            <button class="btn" id="innerHtmlBtn">更新内容</button>
          </div>
        </div>

        <!-- Destroy -->
        <div class="panel">
          <div class="btn-group" style="justify-content: flex-end">
            <button class="btn btn--danger" id="destroy">销毁实例</button>
          </div>
        </div>
      </div>
    </div>

    <script src="./index.umd.js"></script>
    <script>
      // Generate demo items
      const items = [
        { title: '项目 1', desc: '使用 transform: translate3d 实现平移，获得更好的渲染性能。' },
        { title: '项目 2', desc: 'GPU 加速使滚动更加流畅，特别适合移动设备。' },
        { title: '项目 3', desc: '弹性效果通过物理模拟实现，交互反馈更加自然。' },
        { title: '项目 4', desc: '尝试快速拖动并释放，观察惯性滚动效果。' },
        { title: '项目 5', desc: '滚动到边界时会有明显的弹性反馈。' },
        { title: '项目 6', desc: '基于 requestAnimationFrame 实现流畅的逐帧动画。' },
        { title: '项目 7', desc: 'transform 方法避免了 DOM 重排，性能更优。' },
        { title: '项目 8', desc: '弹性系数、摩擦力等物理参数均可调整。' },
        { title: '项目 9', desc: '不同拖动速度可体验不同的弹性反馈效果。' },
        { title: '项目 10', desc: '使用 PointerEvent 统一处理鼠标与触摸事件。' },
        { title: '项目 11', desc: '支持动态更新内容与容器尺寸。' },
        { title: '项目 12', desc: '轻量零依赖，可在任意框架中使用。' },
      ];

      const html = items.map(item => `<div class="item"><h3>${item.title}</h3><p>${item.desc}</p></div>`).join('\n');

      let dragScroll = null;

      document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById('scrollContainer');

        const eventLog = document.getElementById('eventLog');
        let logCount = 0;
        const MAX_LOG = 50;

        function addLog(tag, text) {
          if (logCount >= MAX_LOG) {
            eventLog.removeChild(eventLog.firstChild);
          } else {
            logCount++;
          }
          const div = document.createElement('div');
          div.className = 'log-item';
          div.innerHTML = `<span class="log-tag log-tag--${tag}">${tag}</span>${text}`;
          eventLog.appendChild(div);
          eventLog.scrollTop = eventLog.scrollHeight;
        }

        dragScroll = new DragScroll(container, {
          content: html,
          onChange: state => {
            document.getElementById('positionInfo').textContent = `X: ${Math.round(state.x)}  Y: ${Math.round(state.y)}`;
            document.getElementById('velocityInfo').textContent = `速度: ${state.velocity.toFixed(1)} px/帧`;
          },
          onDragStart: e => {
            addLog('start', `clientY: ${Math.round(e.clientY)}`);
          },
          onDragging: (x, y) => {
            addLog('move', `x: ${x}, y: ${Math.round(y)}`);
          },
          onDragEnd: e => {
            addLog('end', `clientY: ${Math.round(e.clientY)}`);
          },
        });

        // ---- Scroll Controls ----
        document.getElementById('resetBtn').addEventListener('click', () => {
          dragScroll?.scrollToY(0);
        });

        document.getElementById('toTopBtn').addEventListener('click', () => {
          dragScroll?.scrollToY(0);
        });

        document.getElementById('toBottomBtn').addEventListener('click', () => {
          if (!dragScroll) return;
          const max = dragScroll.$content.scrollHeight - dragScroll.$container.clientHeight;
          dragScroll.scrollToY(max);
        });

        // ---- Resize ----
        document.getElementById('resizeBtn').addEventListener('click', () => {
          if (!dragScroll) return;
          const w = document.getElementById('width').value;
          const h = document.getElementById('height').value;
          dragScroll.resize(w, h);
        });

        // ---- Readonly Toggle ----
        document.getElementById('readonly').addEventListener('change', e => {
          if (dragScroll) dragScroll.readonly = e.target.checked;
        });

        // ---- HideScrollbar Toggle ----
        document.getElementById('hideScrollbar').addEventListener('change', e => {
          if (!dragScroll) return;
          // Recreate instance with new hideScrollbar option
          const currentY = dragScroll.currentY;
          dragScroll.destroy();
          dragScroll = new DragScroll(container, {
            content: html,
            hideScrollbar: e.target.checked,
            readonly: document.getElementById('readonly').checked,
            onChange: state => {
              document.getElementById('positionInfo').textContent = `X: ${Math.round(state.x)}  Y: ${Math.round(state.y)}`;
              document.getElementById('velocityInfo').textContent = `速度: ${state.velocity.toFixed(1)} px/帧`;
            },
            onDragStart: ev => addLog('start', `clientY: ${Math.round(ev.clientY)}`),
            onDragging: (x, y) => addLog('move', `x: ${x}, y: ${Math.round(y)}`),
            onDragEnd: ev => addLog('end', `clientY: ${Math.round(ev.clientY)}`),
          });
          dragScroll.scrollToY(currentY, false);
        });

        // ---- Clear Event Log ----
        document.getElementById('clearLog').addEventListener('click', () => {
          eventLog.innerHTML = '';
          logCount = 0;
        });

        // ---- Custom Content ----
        document.getElementById('innerHtmlBtn').addEventListener('click', () => {
          const val = document.getElementById('content').value;
          dragScroll?.innerHtml(val);
        });

        // ---- Destroy ----
        document.getElementById('destroy').addEventListener('click', () => {
          if (!dragScroll) return;
          dragScroll.destroy();
          dragScroll = null;
        });

        dragScroll.innerHtml(html);
      });
    </script>
  </body>
</html>
